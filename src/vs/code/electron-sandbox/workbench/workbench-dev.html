		<!-- Altus boot preloader -->
		<style>
			#altus-preloader {
				position: fixed;
				inset: 0;
				z-index: 999999;
				background: #0a0a0a;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 28px;
				animation: altus-preloader-fade 0.5s ease-out 3s forwards;
			}
			#altus-preloader img {
				width: 96px;
				height: 96px;
				border-radius: 20px;
				animation: altus-preloader-glow 2s ease-in-out infinite;
			}
			#altus-preloader .altus-pre-name {
				font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
				font-size: 13px;
				font-weight: 500;
				letter-spacing: 0.28em;
				text-transform: uppercase;
				color: rgba(255, 255, 255, 0.45);
			}
			#altus-preloader .altus-pre-dots {
				display: flex;
				gap: 8px;
			}
			#altus-preloader .altus-pre-dots span {
				display: block;
				width: 6px;
				height: 6px;
				border-radius: 50%;
				background: #7c5cff;
				animation: altus-dot-pulse 1.3s ease-in-out infinite;
			}
			#altus-preloader .altus-pre-dots span:nth-child(2) { animation-delay: 0.2s; }
			#altus-preloader .altus-pre-dots span:nth-child(3) { animation-delay: 0.4s; background: #19c8ff; }
			@keyframes altus-preloader-fade { to { opacity: 0; visibility: hidden; } }
			@keyframes altus-preloader-glow {
				0%, 100% { box-shadow: 0 0 36px 6px rgba(124, 92, 255, 0.5); }
				50%       { box-shadow: 0 0 56px 14px rgba(25, 200, 255, 0.45); }
			}
			@keyframes altus-dot-pulse {
				0%, 80%, 100% { transform: scale(0.5); opacity: 0.3; }
				40%           { transform: scale(1); opacity: 1; }
			}
		</style>
	</head>
